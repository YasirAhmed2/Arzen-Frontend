<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE ARZENS | Internships</title>
    <meta name="theme-color" content="#2E6EFF" />
    <meta http-equiv="refresh" content="0; url=/internships" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #05060b;
        --bg-secondary: #0b0e1a;
        --accent: #2e6eff;
        --text: #f2f5ff;
        --text-muted: #a7b1d8;
        --border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: 'Inter', sans-serif;
        color: var(--text);
        background:
          radial-gradient(70vw 70vw at -10% -10%, rgba(46, 110, 255, 0.15), transparent 55%),
          radial-gradient(80vw 80vw at 110% 120%, rgba(46, 110, 255, 0.12), transparent 60%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
      }

      .grain-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.06;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .card {
        width: min(680px, 100%);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: clamp(20px, 4vw, 36px);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(6px);
        text-align: center;
      }

      .logo {
        width: 56px;
        height: 56px;
        margin: 0 auto 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-secondary);
        display: grid;
        place-items: center;
      }

      .logo img {
        width: 34px;
        height: 34px;
      }

      .label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(30px, 6vw, 56px);
        line-height: 1.02;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .gradient {
        background-image: linear-gradient(135deg, #2e6eff 0%, #5b8fff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        margin: 16px auto 0;
        max-width: 46ch;
        font-size: clamp(14px, 2.7vw, 18px);
        line-height: 1.6;
        color: var(--text-muted);
      }

      @media (max-width: 480px) {
        .card {
          border-radius: 14px;
          padding: 18px;
        }
      }

      a {
        color: #5b8fff;
      }
    </style>
  </head>
  <body>
    <div class="grain-overlay" aria-hidden="true"></div>

    <main class="card" role="main" aria-label="Internships Redirecting">
      <div class="logo" aria-hidden="true">
        <img src="/logo.png" alt="" />
      </div>
      <div class="label">THE ARZENS INTERNSHIP PROGRAM</div>
      <h1><span class="gradient">Redirecting</span></h1>
      <p>
        The internship application now lives in the main multipager experience. If you are not redirected, <a href="/internships">open it here</a>.
      </p>
    </main>
  </body>
</html>
