<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE ARZENS | Admin Dashboard</title>
    <meta name="theme-color" content="#2E6EFF" />
    <meta http-equiv="refresh" content="0; url=/admin" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #05060b;
        --bg-secondary: #0b0e1a;
        --accent: #2e6eff;
        --text: #f2f5ff;
        --text-muted: #a7b1d8;
        --border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg);
        font-family: 'Inter', sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
      }

      p {
        margin: 0;
        color: var(--text-muted);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <p>Redirecting to the admin dashboard. If you are not redirected, <a href="/admin">open the page</a>.</p>
  </body>
</html>
